name: Comment Preview URL on Issue

on:
  pull_request:
    types: [opened]

jobs:
  comment:
    if: startsWith(github.head_ref, 'community/')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Comment preview URL on issue
        uses: actions/github-script@v7
        with:
          script: |
            // Extract issue number from branch name: community/123 → 123
            const branch = context.payload.pull_request.head.ref;
            const match = branch.match(/^community\/(?:issue-)?(\d+)/);
            if (!match) {
              console.log(`Branch ${branch} does not match community/{number} pattern`);
              return;
            }
            const issueNumber = parseInt(match[1]);
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://deploy-preview-${prNumber}--karma-cycle.netlify.app`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '## Preview Ready',
                '',
                'Your suggestion has been implemented! Try it out here:',
                '',
                `**${previewUrl}**`,
                '',
                'Please test it and leave feedback on this issue.',
                '',
                `_PR: #${prNumber}_`,
              ].join('\n'),
            });
